name: 'Publish Release'

on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Builds macOS (Apple Silicon M1/M2/M3)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Builds macOS (Intel chips)
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'  # Builds Linux (.deb & .AppImage)
            args: ''
          - platform: 'windows-latest' # Builds Windows (.msi & .exe)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev webkit2gtk-4.1 libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: rust-editor-v__VERSION__ # Uses the version in your tauri.conf.json
          releaseName: 'RustEditor v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
